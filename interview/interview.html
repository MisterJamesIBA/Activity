<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inverview</title>

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
        }

        .base {
            display: flex;
            /* フレックスボックスを有効化 */
            justify-content: center;
            /* 水平方向の中央揃え */
            align-items: center;
            /* 垂直方向の中央揃え */
            height: 100%;
            width: 100%;
        }

        .base div {
            width: 80%;
        }

        #level {
            position: fixed;
            top: 0;
            left: 0;
            width: 10%;
            height: 5%;
        }
    </style>
</head>

<body>
    <div class="base">
        <div class="center">
            <h1 id="textBox">Tap the sreeen for a question.</h1>
        </div>
    </div>

    <select name="level" id="level">
        <option value="0">3</option>
        <option value="1">P2</option>
        <option value="2">P2+</option>
        <option value="3">2</option>
    </select>


    <script src="./data.js"></script>
    <script src="./interview.js"></script>
</body>

</html>
