<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
    }

    #cardBoxOne,
    #cardBoxTwo {
      position: relative;
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      width: 49%;
      height: 99%;
      position: absolute;
    }

    #cardBoxOne {
      background-color: blue;
      left: 5px;
      top: 5px;
    }

    #cardBoxTwo {
      float: right;
      background-color: red;
      right: 5px;
      top: 5px;
    }

    .flip-card-front img,
    .flip-card-back img {
      width: 100%;
      height: 100%;
    }

    .flip-card {
      background-color: transparent;
      width: 20%;
      height: 25%;
      perspective: 1000px;
    }

    .flip-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      text-align: center;
      transition: transform 0.6s;
      transform-style: preserve-3d;
      box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2);
    }

    .flip .flip-card-inner {
      transform: rotateY(180deg);
      border: 1px solid black;
    }

    .flip-card-front,
    .flip-card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
    }

    .flip-card-front {
      background-color: #bbb;
      color: black;
    }

    .flip-card-back {
      background-color: #2980b9;
      color: white;
      transform: rotateY(180deg);
    }

    .ui {
      position: fixed;
      z-index: 5;
    }

    .hide {
      visibility: hidden;
    }

    #playerOneInfo,
    #playerTwoInfo {
      width: 50vw;
      height: 100vh;
      position: fixed;
      top: 0;
      display: flex;
      /* フレックスボックスを有効化 */
      justify-content: center;
      /* 水平方向の中央揃え */
      align-items: center;
      /* 垂直方向の中央揃え */
      background-color: #b9292970;
    }

    #playerOneInfo {
      left: 0;
    }

    #playerTwoInfo {
      right: 0;
    }

    /*
    open
    */

    #playerOneOpen {
      top: 0;
      left: 0;
    }

    #playerTwoOpen {
      top: 0;
      right: 0;
    }

    #playerTwoOpen,
    #playerOneOpen {
      z-index: 10;
      position: fixed;
      width: 100px;
      height: 20px;
      background-color: rgba(0, 128, 0, 0.479);
      color: rgba(0, 5, 0, 0.479);
      text-align: center;
    }
  </style>
</head>

<body>

  <div id="cardBoxOne"></div>
  <div id="cardBoxTwo"></div>

  <div class="ui">
    <button id="playerOneOpen">
      player one

    <div id="playerOneInfo" class="info hide"></div>

    function createCard(path) {

      let card = document.createElement("div");
      card.className = "flip-card";

      let cardInner = document.createElement("div");
      cardInner.className = "flip-card-inner";

      // front
      let cardFront = document.createElement("div");
      cardFront.className = "flip-card-front";

      let frontImg = document.createElement("img");
      frontImg.src = path;

      // back
      let cardBack = document.createElement("div");
      cardBack.className = "flip-card-back";

      let backImg = document.createElement("img");
      backImg.src = "./img/back.jpg";

      cardFront.appendChild(frontImg);
      cardBack.appendChild(backImg);

      cardInner.appendChild(cardFront);
      cardInner.appendChild(cardBack);

      card.appendChild(cardInner);

      card.addEventListener("click", () => {
        if (card.classList.contains("flip")) {
          card.classList.remove("flip");
        }
        else {
          card.classList.add("flip");
        }
      })

      return card;


    }


    window.onload = function () {
      let boyPath = Array.from(BOYS, (name) => `./img/boys/${name}.jpg`).sort(() => Math.random() - 0.5).slice(0, 10);
      let girlPath = Array.from(GIRLS, (name) => `./img/girls/${name}.jpg`).sort(() => Math.random() - 0.5).slice(0, 10);

      let combined = boyPath.concat(girlPath);

      console.log(combined.length);

      let cardBox = document.querySelector("#cardBoxOne");
      let cardBoxTwo = document.querySelector("#cardBoxTwo");


      for (let i = 0; i < combined.length; i++) {

        let card = createCard(combined[i]);
        cardBox.appendChild(card);

        let cardTwo = createCard(combined[i]);
        cardBoxTwo.appendChild(cardTwo);
      }


      let playerOneOpen = document.querySelector("#playerOneOpen");
      let playerOneInfo = document.querySelector("#playerOneInfo");


      let playerTwoOpen = document.querySelector("#playerTwoOpen");
      let playerTwoInfo = document.querySelector("#playerTwoInfo");

      let oneIndex = Math.floor(Math.random() * combined.length);
      let twoIndex = Math.floor(Math.random() * combined.length);

      let oneCard = createCard(combined[oneIndex]);
      let twoCard = createCard(combined[twoIndex]);

      playerOneInfo.appendChild(oneCard);
      playerTwoInfo.appendChild(twoCard);


      playerOneOpen.addEventListener("click", () => {

        if (playerOneInfo.classList.contains("hide")) {
          playerOneInfo.classList.remove("hide");
        }
        else {
          playerOneInfo.classList.add("hide");
        }

      });

      playerTwoOpen.addEventListener("click", () => {

    }

  </script>
